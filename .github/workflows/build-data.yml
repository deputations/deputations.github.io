name: Build deputation data

on:
  schedule:
    - cron: "35 3 * * *"   # ~09:05 IST daily
  push:
    branches:
      - main
    paths:
      - scripts/**
      - .github/workflows/build-data.yml

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build data files
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python scripts/build_data.py

      - name: Commit generated files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/*.json

          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: daily deputation data build"
            git push
          fi
